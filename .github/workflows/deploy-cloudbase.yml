# v2.2：push 到默认分支后自动构建前端并部署「plan 云函数 + 静态托管」。
# 在 GitHub 仓库 Settings → Secrets and variables → Actions 中配置：
#   TCB_API_KEY_ID / TCB_API_KEY  （云开发控制台 → 访问服务 → 云 API 密钥，或腾讯云 CAM 子用户密钥 ID/Key）
#   TCB_ENV_ID                    （与根目录 cloudbaserc.json 的 envId 一致）
#   VITE_CLOUD_PLAN_URL           （plan 云函数 HTTP 访问完整 Base URL，无末尾 /）
#   VITE_AMAP_KEY / VITE_AMAP_SECURITY_JS_CODE  （与本地 .env.production 相同，用于构建期注入）
#
# 登录方式参考：https://docs.cloudbase.net/en/framework/ci

name: Deploy CloudBase

on:
  push:
    branches: [master, main]

concurrency:
  group: deploy-cloudbase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        working-directory: frontend
        env:
          VITE_CLOUD_PLAN_URL: ${{ secrets.VITE_CLOUD_PLAN_URL }}
          VITE_AMAP_KEY: ${{ secrets.VITE_AMAP_KEY }}
          VITE_AMAP_SECURITY_JS_CODE: ${{ secrets.VITE_AMAP_SECURITY_JS_CODE }}
        run: |
          npm ci
          npm run build

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli@latest

      - name: Login to CloudBase (non-interactive)
        run: tcb login --apiKeyId "${{ secrets.TCB_API_KEY_ID }}" --apiKey "${{ secrets.TCB_API_KEY }}"

      - name: Deploy cloud function plan
        run: tcb fn deploy plan --force

      - name: Deploy static hosting (frontend/dist → site root)
        run: tcb hosting deploy frontend/dist -e "${{ secrets.TCB_ENV_ID }}"
